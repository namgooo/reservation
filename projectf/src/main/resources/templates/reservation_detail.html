<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>reservationDetail</title>

	<link rel="stylesheet" type="text/css" th:href="@{/bootstrap.min.css}">

	<style>

		*{margin: 0px; padding: 0px;}
		@import url('https://fonts.googleapis.com/css2? family= Abril+Fatface & display=swap');

		#warp{
            height: 100vh;
            background-color:darkslategray;
        }

        .header{
            position: relative;
            background-color:darkslategray;
            top: 20px;
            left: 0px;
            width: 100%;
            height: 100px;
        }

        .header h2{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color:white;
            font-family: 'Abril Fatface';
        }
        
        h3{font-family: 'Abril Fatface';}

        .main{
			position: relative;
			top: 40px;
			left: 50%;
			transform: translateX(-50%);
			width: 1000px;
			height: 700px;
			border-radius:20px;
        }

		.box1{
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }
	
        .box2{
            position: absolute;      
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box3{
            position: absolute;       
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box4{
            position: absolute;          
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box5{
            position: absolute;           
            top: 50%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box6{
            position: absolute;           
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

		#box h3{
			position: absolute;
			color:white;
			top: 50%;
			transform: translateY(-50%);
			left: 0px;
			font-size: 30px;
			z-index: 1;
		}

		#box span{
			position: absolute;
			top: 20%;
			left: 50%;
			width: 300px;
			height: 50px;
			color:white;
			font-size: 30px;
			text-align: center;
		}

		a{
			position: absolute;
			bottom: 150px;
			left: 50%;
			transform: translateX(-50%);
			font-size: 20px;
		}
		
	</style>

</head>
<body>

	<div id="warp">
		
		<div class="header">
			<h2>예약 완료!</h2>
		</div>

		<div class="main">
			
			<div th:each="reservation : ${reservationInfo}">
				<div id="box" class="box1">
					<h3>식당이름 : </h3>
					<span th:text="${reservation.restaurantName}"></span>
				</div>
				
				<div id="box" class="box2">
					<h3>예약자 : </h3>
					<span th:text="${reservation.reservationName}"></span>
				</div>
				
				<div id="box" class="box3">
					<h3>예약날짜 : </h3>
					<span th:text="${reservation.reservationDay}"></span>
				</div>
				
				<div id="box" class="box4">
					<h3>예약시간 : </h3>
					<span th:text="${reservation.reservationTime}"></span>
				</div>
				
				<div id="box" class="box5">
					<h3>인원수 : </h3>
					<span th:text="${reservation.people}"></span>
				</div>
				
				<div id="box" class="box6">
					<h3>요청사항 : </h3>
					<span th:text="${reservation.coment}"></span>
				</div>
			</div>

		</div>

		<div class="btn">
			<button><a th:href="@{/main}">HOME으로 돌아가기</a></button>
		</div>


	</div>

</body>
</html>
