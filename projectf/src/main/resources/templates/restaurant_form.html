<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>restaurantForm</title>

	<link rel="stylesheet" type="text/css" th:href="@{/bootstrap.min.css}">

	<style>

		*{margin: 0px; padding: 0px;}
		@import url('https://fonts.googleapis.com/css2? family= Abril+Fatface & display=swap');

		#warp{
			height: 100vh;
			background-color:darkslategray;
		}

		.header{
			position: relative;
			background-color:darkslategray;
			top: 20px;
			left: 0px;
			width: 100%;
			height: 100px;
		}

		.header h2{
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			font-size: 50px;
			color:white;
			font-family: 'Abril Fatface';
		}

		.main{
			position: relative;
			background-color:darkslategray;
			top: 50px;
			left: 50%;
			transform: translateX(-50%);
			width: 1000px;
			height: 800px;
		}

		.box1{
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box2{
            position: absolute;      
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box3{
            position: absolute;       
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box4{
            position: absolute;          
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box5{
            position: absolute;           
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box6{
            position: absolute;           
            top: 55%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

		#box input{
            position: absolute;
            width: 400px;
            height: 40px;
            left: 50%;
            transform: translateX(-50%);
        }

        #box label{
            position: absolute;
            left: 50px;
            color:white;
        }

		.btn{
            position: absolute;
            width: 400px;
            height: 50px;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
        }

        .alert {
            position: absolute;
            top: 30%;
            left: -100px;
        }
        
        input{
			border-radius: 10px;
		}
        
        
        
        /*사이드바 시작*/
        .sidebar{
            position: relative;
        }

        .sidebar .sidebarmain{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .sidebar ul{}

        .sidebar ul li{
            list-style: none;
        }

        .sidebar ul li a{
            text-decoration: none;
            font-size: 20px;
            color: white;
        }
        /*사이드바 끝*/

        /*사이드바 시작*/
        input[id="menuicon"]{
            display: none;
        }

        input[id="menuicon"] + label {
            display: block;
            right: 0px;
            top: calc(50% - 25px);
            transition: all .35s;
            width: 60px;
            height: 40px;
            position: fixed;
            cursor: pointer;
        }

        input[id="menuicon"]:checked + label {
            z-index: 2;
            right: 300px;
        }

        input[id="menuicon"] + label span{
            display: block;
            position: absolute;
            width: 100%;
            height: 10px;
            border-radius: 30px;
            background: #000;
            transition: all .35s;
        }

        input[id="menuicon"] + label span:nth-child(1){top: 0px;
            transform: translateY(-50%) rotate(-45deg);}

        input[id="menuicon"] + label span:nth-child(2){bottom: 0px;
            transform: translateY(50%) rotate(45deg);}

        input[id="menuicon"]:checked + label span:nth-child(1){top: 50%;
            transform: translateY(-50%) rotate(-45deg);}

        input[id="menuicon"]:checked + label span:nth-child(2){bottom: 50%;
            transform: translateY(50%) rotate(45deg);}

        div[class="sidebar"]{
            width: 300px;
            height: 100%;
            background: #222;
            position: fixed;
            top: 0px;
            right: -300px;
            z-index: 1;
            transition: all .35s;
        }
        
        input[id="menuicon"]:checked + label + div{right: 0px;}
        
        .user{
			color:darkcyan;
			font-size:12px;
		}
        /*사이드바 끝*/
        
        span{color:skyblue;}
        

	</style>

</head>
<body>
	
	<div id="warp">
	
		<!--사이드바 시작-->
        <div class="checkboxmain">
            <input type="checkbox" id="menuicon">
            <label for="menuicon">
                <span></span>
                <span></span>
            </label>
            <div class="sidebar">
                <div class="sidebarmain">
                    <ul>
                        <li>
                            <a th:href="@{/main}">홈으로</a>
                        </li>
                        <li>
                   			<div class="user" sec:authorize="isAuthenticated()">
                   				<a sec:authentication="name"></a><span>님</span>
                   			</div>
                    	</li>
                        <li>
                            <a sec:authorize="isAnonymous()" th:href="@{/user/login}">로그인</a>
                            <a sec:authorize="isAuthenticated()" th:href="@{/user/logout}">로그아웃</a>
                        </li>
                        <li>
                            <a th:href="@{/mypage}">마이페이지</a>
                        </li>
                        <li>
                            <a th:href="@{/user/signup}">회원가입</a>
                        </li>
                        <li>
                            <a th:href="@{/review}">리뷰</a>
                        </li>
                        <li>
                            <a th:href="@{/reservation/create}">예약</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <!--사이드바 끝-->

		<div class="header">
			<h2>식당 등록하기</h2>
		</div>

		<div class="main">
			<form th:action="@{/manager/create}" th:object="${restaurantForm}" method="post" enctype="multipart/form-data">
				
				<div th:replace="errors_form :: formErrorsFragment"></div>
					
				<div id="box" class="box1">
					<label for="restaurantName">식당이름</label><br>
					<input type="text" th:field="*{restaurantName}">
				</div>
				
				<div id="box" class="box2">
					<label for="restaurantAddress">식당주소</label><br>
					<input type="text" th:field="*{restaurantAddress}">
				</div>
				
				<div id="box" class="box3">
					<label for="restaurantTel">식당전화번호</label><br>
					<input type="text" th:field="*{restaurantTel}">
				</div>

				<div id="box" class="box4">
					<label for="owner">식당주인</label><br>
					<input type="text" th:field="*{owner}">
				</div>

				<div id="box" class="box5">
					<label for="buisnessNumber">사업자등록번호</label><br>
					<input type="text" th:field="*{buisnessNumber}">
				</div>

				<div id="box" class="box6">
					<label for="foundingDay">개업일</label><br>
					<input type="date" th:field="*{foundingDay}">
				</div>
				
				<div class="btn">
					<input type="submit" value="등록하기" class="btn btn-warning my-2">
				</div>
					
			</form>

		</div>

	</div>
	

</body>
</html>
