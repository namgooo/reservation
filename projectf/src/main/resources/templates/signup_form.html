<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" type="text/css" th:href="@{/bootstrap.min.css}">
    <link rel="stylesheet" href="signup_form.css">

    <style>

        *{margin: 0px; padding: 0px;}
        @import url('https://fonts.googleapis.com/css2? family= Abril+Fatface & display=swap');

        #warp{
	        height: 100vh;
            background-color:darkslategray;
        }

        .header{
            position: relative;
            top: 20px;
            left: 0px;
            width: 100%;
            height: 100px;
        }

        .header h2{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color:white;
            font-family: 'Abril Fatface';
        }

        .main{
            position: relative;
            top: 0px;
            left: 50%;
            transform: translateX(-50%);
            width: 1000px;
            height: 800px;
            background-color:darkslategray;
        }

        .box1{
            position: absolute;
            
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box2{
            position: absolute;
            
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box3{
            position: absolute;
            
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box4{
            position: absolute;
            
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box5{
            position: absolute;
            
            top: 50%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        .box6{
            position: absolute;
            
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 70px
        }

        #box input{
            position: absolute;
            width: 400px;
            height: 40px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 10px;
        }

        #box label{
            position: absolute;
            left: 50px;
            color:white;
        }

        button{
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 50px;
            border-radius: 10px;
        }

        .alert {
            position: absolute;
            top: 30%;
            left: -100px;
        }

        a{
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
        }
        

    </style>
</head>
<body>
    <div id="warp">
    
        <div class="header">
            <h2>회원가입</h2>
        </div>

        <div class="main">

            <form th:action="@{/user/signup}" th:object="${userCreateForm}" method="post">
    
                <div th:replace="errors_form :: formErrorsFragment"></div>
                
                <div class="box1" id="box">
                    <label for="username" class="form-label">아이디</label><br>
                    <input type="text" th:field="*{customerId}" class="">
                </div>
                
                <div class="box2" id="box">
                    <label for="password1" class="form-label">비밀번호</label><br>
                    <input type="password" th:field="*{password1}" class="">
                </div>
                
                <div class="box3" id="box">
                    <label for="password2" class="form-label">비밀번호 확인</label><br>
                    <input type="password" th:field="*{password2}" class="">
                </div>
                
                <div class="box4" id="box">
                    <label for="username" class="form-label">이름</label><br>
                    <input type="text" th:field="*{name}" class="">
                </div>
                
                <div class="box5" id="box">
                    <label for="email" class="form-label">이메일</label><br>
                    <input type="email" th:field="*{email}" class="">
                </div>
                
                <div class="box6" id="box">
                    <label for="username" class="form-label">전화번호</label><br>
                    <input type="text" th:field="*{tel}" class="">
                </div>
                
                <button type="submit" class="btn btn-warning">가입하기</button>
                <a th:href="@{/main}">Home으로 돌아가기</a>
            </form>
        </div>
    </div>
</body>
</html>
